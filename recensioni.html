<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lascia una recensione · Casa Pilla</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--sea:#1d5f7a;--sea2:#2e87ab;--sand:#f7f2ea;--cream:#fdfaf5;--ink:#1c2b35;--muted:#7a8e98;--border:#e0d8cc;--white:#fff;}
body{font-family:'Jost',sans-serif;background:var(--sand);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}
.card{background:var(--white);border-radius:20px;box-shadow:0 24px 64px rgba(15,74,97,.13);width:100%;max-width:460px;overflow:hidden;}
.top{background:linear-gradient(135deg,#1d5f7a,#2e87ab);padding:2rem 2rem 1.6rem;text-align:center;}
.top-eyebrow{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:.5rem;}
.top-title{font-family:'Playfair Display',serif;font-size:1.5rem;color:#fff;margin-bottom:.3rem;}
.top-sub{font-size:.8rem;color:rgba(255,255,255,.6);}
.body{padding:1.8rem 2rem;}
.star-label{font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:.8rem;display:block;text-align:center;}
.star-picker{display:flex;gap:.3rem;margin-bottom:1.5rem;justify-content:center;}
.star-picker span{font-size:2.2rem;cursor:pointer;filter:grayscale(1) opacity(.3);transition:filter .15s,transform .1s;line-height:1;user-select:none;}
.star-picker span.on{filter:none;}
.star-picker span:hover{transform:scale(1.15);}
.fg{display:flex;flex-direction:column;gap:.3rem;margin-bottom:1rem;}
label{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
input,textarea{padding:.7rem 1rem;border:1.5px solid var(--border);border-radius:10px;font-family:'Jost',sans-serif;font-size:.88rem;color:var(--ink);outline:none;background:var(--cream);width:100%;transition:border-color .15s,box-shadow .15s;}
input:focus,textarea:focus{border-color:var(--sea);box-shadow:0 0 0 3px rgba(29,95,122,.07);}
textarea{resize:vertical;min-height:100px;}
.err{font-size:.78rem;color:#b91c1c;margin-bottom:.8rem;display:none;}
.err.on{display:block;}
.btn{width:100%;padding:.9rem;margin-top:.5rem;background:linear-gradient(135deg,#1d5f7a,#2e87ab);color:#fff;border:none;border-radius:12px;font-family:'Jost',sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;box-shadow:0 6px 18px rgba(29,95,122,.25);transition:opacity .2s,transform .1s;}
.btn:hover{opacity:.9;transform:translateY(-1px);}
.btn:disabled{opacity:.4;cursor:default;transform:none;}
.success{display:none;text-align:center;padding:2rem;}
.success.on{display:block;}
.success-icon{font-size:3rem;margin-bottom:1rem;}
.success-title{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--sea);margin-bottom:.5rem;}
.success-sub{font-size:.85rem;color:var(--muted);line-height:1.6;}
.foot{background:var(--sand);border-top:1px solid var(--border);padding:1rem 2rem;text-align:center;font-size:.72rem;color:var(--muted);}
</style>
</head>
<body>
<div class="card">
  <div class="top">
    <div class="top-eyebrow">🌊 Termoli · Adriatico</div>
    <div class="top-title">Casa Pilla</div>
    <div class="top-sub">Raccontaci com'è andata la tua vacanza</div>
  </div>
  <div class="body">
    <div id="formArea">
      <span class="star-label">La tua valutazione *</span>
      <div class="star-picker" id="starPicker">
        <span data-v="1">⭐</span><span data-v="2">⭐</span><span data-v="3">⭐</span><span data-v="4">⭐</span><span data-v="5">⭐</span>
      </div>
      <div class="fg"><label>Il tuo nome *</label><input type="text" id="rName" placeholder="Mario Rossi"></div>
      <div class="fg"><label>La tua recensione *</label><textarea id="rText" placeholder="Raccontaci la tua esperienza a Casa Pilla…"></textarea></div>
      <div class="err" id="rErr"></div>
      <button class="btn" id="rBtn" onclick="submitReview()">Invia recensione ✨</button>
    </div>
    <div class="success" id="successArea">
      <div class="success-icon">🌊</div>
      <div class="success-title">Grazie mille!</div>
      <div class="success-sub">La tua recensione è stata pubblicata.<br>Speriamo di rivederti presto a Casa Pilla!</div>
    </div>
  </div>
  <div class="foot">Casa Pilla · Termoli · © 2026</div>
</div>

<script type="module">
const FB_CFG = {
  apiKey:      'AIzaSyDiCvu5yjd-XAxlM9f-3ETOblQU96yAMqY',
  authDomain:  'casa-pilla.firebaseapp.com',
  databaseURL: 'https://casa-pilla-default-rtdb.europe-west1.firebasedatabase.app',
  projectId:   'casa-pilla',
};

let fbPush = null;

async function initFB() {
  try {
    const {initializeApp,getApps} = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const {getDatabase,ref,push}  = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
    if(!getApps().length) initializeApp(FB_CFG);
    const db = getDatabase();
    fbPush = (data) => push(ref(db,'reviews'), data);
  } catch(e) { console.log('FB error', e); }
}
initFB();

let selectedStars = 0;

document.getElementById('starPicker').addEventListener('click', e => {
  const span = e.target.closest('[data-v]');
  if(!span) return;
  selectedStars = parseInt(span.dataset.v);
  document.querySelectorAll('#starPicker span').forEach((s,i) => {
    s.classList.toggle('on', i < selectedStars);
    s.style.filter = i < selectedStars ? 'none' : 'grayscale(1) opacity(.3)';
  });
});

document.querySelectorAll('#starPicker span').forEach((s, i) => {
  s.addEventListener('mouseenter', () => {
    document.querySelectorAll('#starPicker span').forEach((ss, ii) => {
      ss.style.filter = ii <= i ? 'none' : 'grayscale(1) opacity(.3)';
    });
  });
  s.addEventListener('mouseleave', () => {
    document.querySelectorAll('#starPicker span').forEach((ss, ii) => {
      ss.style.filter = ii < selectedStars ? 'none' : 'grayscale(1) opacity(.3)';
    });
  });
});

window.submitReview = async function() {
  const name = document.getElementById('rName').value.trim();
  const text = document.getElementById('rText').value.trim();
  const err  = document.getElementById('rErr');
  err.classList.remove('on');
  if(!selectedStars) { err.textContent='Seleziona quante stelle vuoi dare.'; err.classList.add('on'); return; }
  if(!name)          { err.textContent='Inserisci il tuo nome.'; err.classList.add('on'); return; }
  if(!text)          { err.textContent='Scrivi la tua recensione.'; err.classList.add('on'); return; }
  if(!fbPush)        { err.textContent='Errore di connessione. Riprova tra qualche secondo.'; err.classList.add('on'); return; }
  const btn = document.getElementById('rBtn');
  btn.disabled = true; btn.textContent = 'Invio in corso…';
  try {
    await fbPush({ name, text, stars: selectedStars, ts: Date.now() });
    document.getElementById('formArea').style.display = 'none';
    document.getElementById('successArea').classList.add('on');
  } catch(e) {
    err.textContent = "Errore durante l'invio. Riprova.";
    err.classList.add('on');
    btn.disabled = false; btn.textContent = 'Invia recensione ✨';
  }
};
</script>
</body>
</html>
